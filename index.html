<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Watermark & Logo Remover Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap');
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            overscroll-behavior-y: none;
            background-image: 
                radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%), 
                radial-gradient(at 50% 0%, hsla(225,39%,30%,0.2) 0, transparent 50%), 
                radial-gradient(at 100% 0%, hsla(339,49%,30%,0.2) 0, transparent 50%);
            background-attachment: fixed;
        }
        
        .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.3);
        }

        #workspace {
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
            position: relative;
            display: inline-block;
        }

        .brush-cursor {
            cursor: crosshair;
        }

        .custom-file-upload {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            background: rgba(15, 23, 42, 0.6);
        }
        
        .custom-file-upload:hover {
            border-color: #8b5cf6;
            background: rgba(30, 41, 59, 0.8);
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(139, 92, 246, 0.15);
        }

        .btn-gradient {
            background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            background-size: 200% auto;
            transition: 0.5s;
        }
        .btn-gradient:hover {
            background-position: right center;
            box-shadow: 0 0 15px rgba(168, 85, 247, 0.4);
        }

        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 16px;
            width: 16px;
            border-radius: 50%;
            background: #a855f7;
            cursor: pointer;
            margin-top: -6px;
            box-shadow: 0 0 10px rgba(168, 85, 247, 0.5);
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            cursor: pointer;
            background: #334155;
            border-radius: 2px;
        }

        footer {
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        #loader {
            display: none;
            position: absolute;
            inset: 0;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(4px);
            z-index: 50;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <header class="py-5 px-6 z-10 relative border-b border-white/5 glass-panel">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-indigo-400 to-purple-400 flex items-center gap-3">
                <i class="fa-solid fa-eraser text-indigo-400"></i> Magic Eraser Pro
            </h1>
        </div>
    </header>

    <main class="flex-grow flex flex-col items-center p-4 md:p-6 w-full max-w-6xl mx-auto mb-16">
        
        <div id="uploadSection" class="w-full max-w-3xl mt-16 flex flex-col">
            <div id="dropZone" class="relative custom-file-upload flex flex-col items-center justify-center w-full h-80 border-2 border-dashed border-slate-600 rounded-2xl overflow-hidden">
                <div class="flex flex-col items-center justify-center pt-5 pb-6 pointer-events-none">
                    <div class="w-20 h-20 bg-slate-800 rounded-full flex items-center justify-center mb-4 border border-slate-700 shadow-lg">
                        <i class="fa-solid fa-image text-3xl text-indigo-400"></i>
                    </div>
                    <p class="mb-2 text-lg text-slate-300"><span class="font-semibold text-purple-400">Click to upload</span> or drag and drop</p>
                    <p class="text-sm text-slate-500 mt-2 bg-slate-800/50 py-1 px-3 rounded-full">High-Resolution Quality Preserved</p>
                </div>
                <input id="imageInput" type="file" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer" accept="image/*" title="Upload Image" />
            </div>
        </div>

        <div id="editorSection" class="hidden flex-col gap-6 w-full">
            
            <div class="glass-panel w-full rounded-2xl p-4 flex flex-col lg:flex-row justify-between items-center gap-4 shadow-xl">
                
                <div class="flex items-center gap-4 w-full lg:w-auto bg-slate-800/50 px-4 py-2 rounded-xl border border-slate-700/50">
                    <i class="fa-solid fa-paintbrush text-slate-400"></i>
                    <div class="flex flex-col w-32 md:w-48">
                        <span class="text-xs text-slate-400 mb-1 font-medium">Brush Size: <span id="brushSizeLabel">25</span>px</span>
                        <input type="range" id="brushSize" min="5" max="100" value="25">
                    </div>
                </div>

                <div class="flex flex-wrap justify-center gap-2 w-full lg:w-auto">
                    <button id="btnClearSelection" class="px-4 py-2.5 bg-slate-800 hover:bg-slate-700 text-slate-300 rounded-xl font-medium transition-colors text-sm border border-slate-700 flex items-center gap-2" title="Clear Brush Selection">
                        <i class="fa-solid fa-eraser"></i> Clear Brush
                    </button>
                    <button id="btnUndo" class="px-4 py-2.5 bg-slate-800 hover:bg-slate-700 text-slate-300 rounded-xl font-medium transition-colors text-sm border border-slate-700 flex items-center gap-2 disabled:opacity-40 disabled:cursor-not-allowed" disabled title="Undo Last Removal">
                        <i class="fa-solid fa-rotate-left"></i> Undo Action
                    </button>
                    <button id="btnRemove" class="px-6 py-2.5 btn-gradient text-white rounded-xl font-semibold shadow-lg text-sm flex items-center gap-2 disabled:opacity-50 disabled:cursor-not-allowed transform active:scale-95 transition-transform" disabled>
                        <i class="fa-solid fa-wand-magic-sparkles"></i> Remove Marked Area
                    </button>
                    <div class="w-px h-10 bg-slate-700 mx-1 hidden sm:block"></div>
                    <button id="btnDownload" class="px-5 py-2.5 bg-emerald-600 hover:bg-emerald-500 text-white rounded-xl font-medium transition-colors shadow-lg text-sm flex items-center gap-2">
                        <i class="fa-solid fa-download"></i> Save High-Res
                    </button>
                </div>
            </div>

            <div class="relative glass-panel p-3 rounded-2xl border border-slate-700 overflow-hidden flex justify-center items-center bg-slate-900/50 min-h-[50vh]">
                
                <div id="workspace" class="brush-cursor rounded-lg overflow-hidden shadow-2xl ring-1 ring-white/10">
                    <img id="displayImage" class="max-w-full max-h-[65vh] object-contain block pointer-events-none" alt="Workspace" />
                    <canvas id="drawingCanvas" class="absolute top-0 left-0 w-full h-full touch-none"></canvas>
                    
                    <div id="loader" class="flex">
                        <i class="fa-solid fa-circle-notch fa-spin text-4xl text-purple-500 mb-3"></i>
                        <span class="text-sm font-medium text-slate-300">Processing Pixels...</span>
                    </div>
                </div>
            </div>
            
            <canvas id="processingCanvas" class="hidden"></canvas>
        </div>
    </main>

    <footer class="fixed bottom-0 w-full py-3 px-4 text-center z-50">
        <p class="text-sm font-medium tracking-wide text-slate-400">
            Developed by <span class="text-white font-semibold hover:text-indigo-400 transition-colors cursor-pointer">Revanth Reddy Abbati</span>
        </p>
    </footer>

    <script>
        // DOM Elements
        const imageInput = document.getElementById('imageInput');
        const dropZone = document.getElementById('dropZone');
        const uploadSection = document.getElementById('uploadSection');
        const editorSection = document.getElementById('editorSection');
        const displayImage = document.getElementById('displayImage');
        const workspace = document.getElementById('workspace');
        
        const drawingCanvas = document.getElementById('drawingCanvas');
        const drawCtx = drawingCanvas.getContext('2d', { willReadFrequently: true });
        
        const processingCanvas = document.getElementById('processingCanvas');
        const processCtx = processingCanvas.getContext('2d', { willReadFrequently: true });
        
        const btnClearSelection = document.getElementById('btnClearSelection');
        const btnUndo = document.getElementById('btnUndo');
        const btnRemove = document.getElementById('btnRemove');
        const btnDownload = document.getElementById('btnDownload');
        const brushSizeInput = document.getElementById('brushSize');
        const brushSizeLabel = document.getElementById('brushSizeLabel');
        const loader = document.getElementById('loader');

        // App State
        let originalImageObj = new Image();
        let isDrawing = false;
        let hasSelection = false;
        let brushSize = parseInt(brushSizeInput.value);
        let historyStack = [];

        // Brush Settings
        brushSizeInput.addEventListener('input', (e) => {
            brushSize = parseInt(e.target.value);
            brushSizeLabel.innerText = brushSize;
        });

        window.addEventListener('resize', resizeDrawingCanvas);

        function resizeDrawingCanvas() {
            if (!displayImage.src) return;
            drawingCanvas.width = displayImage.clientWidth;
            drawingCanvas.height = displayImage.clientHeight;
            drawCtx.lineCap = 'round';
            drawCtx.lineJoin = 'round';
            drawCtx.strokeStyle = 'rgba(239, 68, 68, 0.6)'; // Semi-transparent red mask
            clearSelection();
        }

        // --- File Upload & Drag-Drop Logic ---
        function handleFile(file) {
            if (!file || !file.type.startsWith('image/')) return;

            const reader = new FileReader();
            reader.onload = (event) => {
                originalImageObj.onload = () => {
                    processingCanvas.width = originalImageObj.naturalWidth;
                    processingCanvas.height = originalImageObj.naturalHeight;
                    processCtx.drawImage(originalImageObj, 0, 0);
                    
                    displayImage.src = event.target.result;
                    
                    historyStack = [];
                    updateUndoButton();
                    
                    uploadSection.classList.add('hidden');
                    uploadSection.classList.remove('flex');
                    editorSection.classList.remove('hidden');
                    editorSection.classList.add('flex');
                    
                    setTimeout(resizeDrawingCanvas, 50);
                };
                originalImageObj.src = event.target.result;
            };
            reader.readAsDataURL(file);
        }

        imageInput.addEventListener('change', (e) => {
            handleFile(e.target.files[0]);
            // Reset input so same file can be selected again if needed
            e.target.value = ''; 
        });

        // Drag and Drop Events
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('border-indigo-500');
        });

        dropZone.addEventListener('dragleave', (e) => {
            e.preventDefault();
            dropZone.classList.remove('border-indigo-500');
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('border-indigo-500');
            if (e.dataTransfer.files.length) {
                handleFile(e.dataTransfer.files[0]);
            }
        });

        // --- Drawing Logic ---
        function getPointerPos(e) {
            const rect = drawingCanvas.getBoundingClientRect();
            return {
                x: e.clientX - rect.left,
                y: e.clientY - rect.top
            };
        }

        drawingCanvas.addEventListener('pointerdown', (e) => {
            isDrawing = true;
            hasSelection = true;
            btnRemove.disabled = false;
            const pos = getPointerPos(e);
            
            drawCtx.lineWidth = brushSize;
            drawCtx.beginPath();
            drawCtx.moveTo(pos.x, pos.y);
            drawCtx.lineTo(pos.x, pos.y); // Draw dot on click
            drawCtx.stroke();
            e.preventDefault(); 
        });

        drawingCanvas.addEventListener('pointermove', (e) => {
            if (!isDrawing) return;
            const pos = getPointerPos(e);
            drawCtx.lineTo(pos.x, pos.y);
            drawCtx.stroke();
            e.preventDefault();
        });

        const stopDrawing = (e) => {
            if (isDrawing) {
                isDrawing = false;
                drawCtx.closePath();
            }
        };

        drawingCanvas.addEventListener('pointerup', stopDrawing);
        drawingCanvas.addEventListener('pointerout', stopDrawing);

        // --- Button Actions ---
        function clearSelection() {
            drawCtx.clearRect(0, 0, drawingCanvas.width, drawingCanvas.height);
            hasSelection = false;
            btnRemove.disabled = true;
        }

        btnClearSelection.addEventListener('click', clearSelection);

        function saveStateToHistory() {
            const currentData = processCtx.getImageData(0, 0, processingCanvas.width, processingCanvas.height);
            historyStack.push(currentData);
            if (historyStack.length > 10) historyStack.shift();
            updateUndoButton();
        }

        function updateUndoButton() {
            btnUndo.disabled = historyStack.length === 0;
        }

        btnUndo.addEventListener('click', () => {
            if (historyStack.length === 0) return;
            const previousState = historyStack.pop();
            processCtx.putImageData(previousState, 0, 0);
            updateDisplayImage();
            updateUndoButton();
            clearSelection();
        });

        // --- Inpainting Logic ---
        btnRemove.addEventListener('click', () => {
            if (!hasSelection) return;
            loader.style.display = 'flex';
            setTimeout(() => {
                executeRemoval();
                loader.style.display = 'none';
            }, 50);
        });

        function executeRemoval() {
            saveStateToHistory();

            const imgW = processingCanvas.width;
            const imgH = processingCanvas.height;
            const dispW = drawingCanvas.width;
            const dispH = drawingCanvas.height;

            const maskCanvas = document.createElement('canvas');
            maskCanvas.width = imgW;
            maskCanvas.height = imgH;
            const mCtx = maskCanvas.getContext('2d', { willReadFrequently: true });
            mCtx.drawImage(drawingCanvas, 0, 0, imgW, imgH);
            
            const maskImageData = mCtx.getImageData(0, 0, imgW, imgH);
            const maskData = maskImageData.data;

            const imgData = processCtx.getImageData(0, 0, imgW, imgH);
            const pixels = imgData.data;

            let minX = imgW, minY = imgH, maxX = 0, maxY = 0;
            for (let y = 0; y < imgH; y++) {
                for (let x = 0; x < imgW; x++) {
                    if (maskData[(y * imgW + x) * 4 + 3] > 0) {
                        if (x < minX) minX = x;
                        if (x > maxX) maxX = x;
                        if (y < minY) minY = y;
                        if (y > maxY) maxY = y;
                    }
                }
            }

            if (minX > maxX) {
                clearSelection();
                return;
            }

            const pad = 2;
            minX = Math.max(0, minX - pad);
            minY = Math.max(0, minY - pad);
            maxX = Math.min(imgW - 1, maxX + pad);
            maxY = Math.min(imgH - 1, maxY + pad);

            const originalPixels = new Uint8ClampedArray(pixels);
            const getIdx = (x, y) => (y * imgW + x) * 4;

            for (let y = minY; y <= maxY; y++) {
                for (let x = minX; x <= maxX; x++) {
                    const idx = getIdx(x, y);
                    
                    if (maskData[idx + 3] > 0) {
                        let distL = 1, distR = 1, distU = 1, distD = 1;
                        let colorL = null, colorR = null, colorU = null, colorD = null;

                        for (let i = x - 1; i >= 0; i--) {
                            if (maskData[getIdx(i, y) + 3] === 0) { colorL = getIdx(i, y); distL = x - i; break; }
                        }
                        for (let i = x + 1; i < imgW; i++) {
                            if (maskData[getIdx(i, y) + 3] === 0) { colorR = getIdx(i, y); distR = i - x; break; }
                        }
                        for (let j = y - 1; j >= 0; j--) {
                            if (maskData[getIdx(x, j) + 3] === 0) { colorU = getIdx(x, j); distU = y - j; break; }
                        }
                        for (let j = y + 1; j < imgH; j++) {
                            if (maskData[getIdx(x, j) + 3] === 0) { colorD = getIdx(x, j); distD = j - y; break; }
                        }

                        const wL = colorL !== null ? 1 / (distL * distL) : 0;
                        const wR = colorR !== null ? 1 / (distR * distR) : 0;
                        const wU = colorU !== null ? 1 / (distU * distU) : 0;
                        const wD = colorD !== null ? 1 / (distD * distD) : 0;
                        
                        const totalWeight = wL + wR + wU + wD;

                        if (totalWeight > 0) {
                            for (let c = 0; c < 3; c++) {
                                let val = 0;
                                if (colorL !== null) val += originalPixels[colorL + c] * wL;
                                if (colorR !== null) val += originalPixels[colorR + c] * wR;
                                if (colorU !== null) val += originalPixels[colorU + c] * wU;
                                if (colorD !== null) val += originalPixels[colorD + c] * wD;
                                
                                val = val / totalWeight;
                                const noise = (Math.random() - 0.5) * 6;
                                pixels[idx + c] = Math.min(255, Math.max(0, val + noise));
                            }
                            pixels[idx + 3] = 255;
                        }
                    }
